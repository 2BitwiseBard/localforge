name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.13 is excluded until tree-sitter-languages~=1.10 ships a 3.13 wheel
        # (the package appears unmaintained; revisit when migrating to
        # tree-sitter-language-pack).
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ".[all,dev]"
      - run: pytest tests/ -v

  validate-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/validate_templates.py

  typecheck:
    runs-on: ubuntu-latest
    # Non-blocking: the codebase has ~100 pre-existing mypy errors that need
    # a dedicated cleanup pass. Keep the job running so the count is visible
    # in CI logs, but don't fail PRs on it until the backlog is worked through.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[all,dev]"
      - run: mypy src/localforge --ignore-missing-imports
